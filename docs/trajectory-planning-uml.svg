<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="700" viewBox="0 0 1080 700">
  <style>
    .title { font: 700 20px Arial, sans-serif; fill: #102a43; }
    .subtitle { font: 13px Arial, sans-serif; fill: #486581; }
    .box-title { font: 700 16px Arial, sans-serif; fill: #102a43; }
    .meta { font: italic 12px Arial, sans-serif; fill: #5c677d; }
    .text { font: 13px Arial, sans-serif; fill: #1f2933; }
    .label { font: 12px Arial, sans-serif; fill: #334e68; }
    .box { fill: #f8f5ef; stroke: #284b63; stroke-width: 2; rx: 12; ry: 12; }
    .accent { fill: #e6f4f1; stroke: #197278; stroke-width: 2; rx: 12; ry: 12; }
    .line { stroke: #284b63; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dashed { stroke-dasharray: 8 6; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#284b63" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1080" height="700" fill="#fbfcfe" />
  <text x="30" y="36" class="title">Trajectory Planning UML</text>
  <text x="30" y="58" class="subtitle">Updated for the current Unity runtime demo, discrete replanning, drag controls, and camera utilities.</text>
  <rect x="30" y="70" width="250" height="184" class="box" />
  <text x="48" y="98" class="box-title">MotionProfileSettings</text>
  <text x="48" y="118" class="meta">struct</text>
  <line x1="42" y1="130" x2="268" y2="130" stroke="#284b63" stroke-width="1.5" />
  <text x="48" y="155" class="text">+ sampleInterval : float</text>
  <text x="48" y="177" class="text">+ maxVelocity : float</text>
  <text x="48" y="199" class="text">+ acceleration : float</text>
  <text x="48" y="221" class="text">+ deceleration : float</text>
  <text x="48" y="243" class="text">+ Validate() : void</text>
  <rect x="320" y="70" width="250" height="162" class="box" />
  <text x="338" y="98" class="box-title">TrajectorySample</text>
  <text x="338" y="118" class="meta">readonly struct</text>
  <line x1="332" y1="130" x2="558" y2="130" stroke="#284b63" stroke-width="1.5" />
  <text x="338" y="155" class="text">+ Time : float</text>
  <text x="338" y="177" class="text">+ Distance : float</text>
  <text x="338" y="199" class="text">+ Velocity : float</text>
  <text x="338" y="221" class="text">+ Position : Vector3</text>
  <rect x="610" y="70" width="320" height="250" class="accent" />
  <text x="628" y="98" class="box-title">TrajectoryPlan</text>
  <text x="628" y="118" class="meta">class</text>
  <line x1="622" y1="130" x2="918" y2="130" stroke="#284b63" stroke-width="1.5" />
  <text x="628" y="155" class="text">+ Start : Vector3</text>
  <text x="628" y="177" class="text">+ End : Vector3</text>
  <text x="628" y="199" class="text">+ TotalDistance : float</text>
  <text x="628" y="221" class="text">+ TotalTime : float</text>
  <text x="628" y="243" class="text">+ PeakVelocity : float</text>
  <text x="628" y="265" class="text">+ Samples : IReadOnlyList&lt;TrajectorySample&gt;</text>
  <text x="628" y="287" class="text">+ EvaluatePosition(time) : Vector3</text>
  <text x="628" y="309" class="text">+ EvaluateVelocity(time) : float</text>
  <rect x="30" y="300" width="330" height="118" class="accent" />
  <text x="48" y="328" class="box-title">TrapezoidalTrajectoryPlanner</text>
  <text x="48" y="348" class="meta">static class</text>
  <line x1="42" y1="360" x2="348" y2="360" stroke="#284b63" stroke-width="1.5" />
  <text x="48" y="385" class="text">+ Generate(start, end, settings) : TrajectoryPlan</text>
  <text x="48" y="407" class="text">+ Generate(start, end, settings, initialVelocity) : TrajectoryPlan</text>
  <rect x="395" y="280" width="360" height="162" class="accent" />
  <text x="413" y="308" class="box-title">TrajectoryDemoController</text>
  <text x="413" y="328" class="meta">class : MonoBehaviour</text>
  <line x1="407" y1="340" x2="743" y2="340" stroke="#284b63" stroke-width="1.5" />
  <text x="413" y="365" class="text">+ RebuildPlan() : void</text>
  <text x="413" y="387" class="text">+ RebuildPlan(preserveCurrentMotion) : void</text>
  <text x="413" y="409" class="text">+ Play() : void</text>
  <text x="413" y="431" class="text">+ HandleControlPointChanged(role) : void</text>
  <rect x="790" y="300" width="240" height="140" class="box" />
  <text x="808" y="328" class="box-title">TrajectoryControlPoint</text>
  <text x="808" y="348" class="meta">class : MonoBehaviour</text>
  <line x1="802" y1="360" x2="1018" y2="360" stroke="#284b63" stroke-width="1.5" />
  <text x="808" y="385" class="text">+ Initialize(controller, role) : void</text>
  <text x="808" y="407" class="text">+ ControlPointRole</text>
  <text x="808" y="429" class="text">+ DragPlane</text>
  <rect x="30" y="470" width="330" height="118" class="box" />
  <text x="48" y="498" class="box-title">TrajectoryCameraSwitcher</text>
  <text x="48" y="518" class="meta">class : MonoBehaviour</text>
  <line x1="42" y1="530" x2="348" y2="530" stroke="#284b63" stroke-width="1.5" />
  <text x="48" y="555" class="text">+ SetCameras(configuredCameras) : void</text>
  <text x="48" y="577" class="text">+ ActivateCamera(index) : void</text>
  <rect x="395" y="500" width="300" height="140" class="box" />
  <text x="413" y="528" class="box-title">TrajectoryCameraController</text>
  <text x="413" y="548" class="meta">class : MonoBehaviour</text>
  <line x1="407" y1="560" x2="683" y2="560" stroke="#284b63" stroke-width="1.5" />
  <text x="413" y="585" class="text">+ Update() : void</text>
  <text x="413" y="607" class="text">+ UpdateRotation() : void</text>
  <text x="413" y="629" class="text">+ UpdateTranslation() : void</text>
  <rect x="730" y="500" width="300" height="96" class="box" />
  <text x="748" y="528" class="box-title">TrajectoryDemoBootstrap</text>
  <text x="748" y="548" class="meta">static class</text>
  <line x1="742" y1="560" x2="1018" y2="560" stroke="#284b63" stroke-width="1.5" />
  <text x="748" y="585" class="text">+ CreateDemoControllerIfMissing() : void</text>
  <line x1="280" y1="140" x2="320" y2="140" class="line" />
  <text x="300.0" y="132.0" text-anchor="middle" class="label">configures</text>
  <line x1="570" y1="160" x2="610" y2="160" class="line" />
  <text x="590.0" y="152.0" text-anchor="middle" class="label">contains</text>
  <line x1="360" y1="360" x2="395" y2="360" class="line dashed" />
  <text x="377.5" y="352.0" text-anchor="middle" class="label">used by</text>
  <line x1="250" y1="300" x2="250" y2="215" class="line" />
  <text x="250.0" y="249.5" text-anchor="middle" class="label">uses</text>
  <line x1="360" y1="360" x2="610" y2="215" class="line" />
  <text x="485.0" y="279.5" text-anchor="middle" class="label">returns</text>
  <line x1="755" y1="360" x2="790" y2="360" class="line dashed" />
  <text x="772.5" y="352.0" text-anchor="middle" class="label">receives drag events from</text>
  <line x1="195" y1="470" x2="545" y2="435" class="line dashed" />
  <text x="370.0" y="444.5" text-anchor="middle" class="label">created/managed by</text>
  <line x1="545" y1="500" x2="545" y2="435" class="line dashed" />
  <text x="545.0" y="459.5" text-anchor="middle" class="label">attached to cameras</text>
  <line x1="880" y1="500" x2="730" y2="415" class="line" />
  <text x="805.0" y="449.5" text-anchor="middle" class="label">creates demo host</text>
</svg>
